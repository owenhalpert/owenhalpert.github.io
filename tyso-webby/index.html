<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TYSO Webby Watch</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, 'Segoe UI', Arial, sans-serif;
      background: #fff;
      color: #111;
      font-size: 15px;
      line-height: 1.45;
      display: flex;
      flex-direction: column;
      padding: 32px 24px 24px;
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      border-bottom: 2px solid #111;
      padding-bottom: 14px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #status {
      font-size: 0.72rem;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Card wrapping both categories */
    #dashboard {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      min-height: 0;
    }

    .categories-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
    }

    .category {
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .category + .category {
      border-left: 1.5px solid #ddd;
    }

    .category-header {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #555;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-shrink: 0;
    }

    .total-votes {
      font-size: 0.68rem;
      font-weight: 400;
      color: #bbb;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }

    .entries {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 0;
    }

    .entry {
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .entry:last-child { border-bottom: none; }

    .entry-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
      gap: 10px;
    }

    .entry-title {
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.25;
    }

    .entry-stat {
      font-size: 0.75rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      color: #888;
      flex-shrink: 0;
    }

    .bar-track {
      height: 4px;
      background: #eee;
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: #111;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .rank {
      font-size: 0.68rem;
      color: #bbb;
      font-variant-numeric: tabular-nums;
      margin-right: 5px;
    }

    /* Highlighted entry */
    .entry.highlight .entry-title {
      color: #111;
    }

    .entry.highlight .bar-fill {
      background: #e9f259;
    }

    .entry.highlight .entry-stat {
      color: #8a9200;
      font-weight: 700;
    }

    footer {
      margin-top: 14px;
      font-size: 0.7rem;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    footer a {
      color: #aaa;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }

    .error-msg {
      font-size: 0.85rem;
      color: #888;
      padding: 24px;
    }

    @media (max-width: 600px) {
      body { padding: 20px 16px 16px; }
      .categories-grid { grid-template-columns: 1fr; }
      .category + .category { border-left: none; border-top: 1.5px solid #ddd; }
    }
  </style>
</head>
<body>

<header>
  <h1>TYSO Webby Watch</h1>
  <div id="status">Loading...</div>
</header>

<div id="dashboard"></div>

<footer>
  <span>Updates every 30 min</span>
  <a href="https://vote.webbyawards.com" target="_blank" rel="noopener">Vote on Webby Awards ↗</a>
</footer>

<script>
  const HIGHLIGHT_KEYWORDS = ['paul rudd', 'tyso', 'take your shoes off'];

  function isHighlight(title) {
    const lower = title.toLowerCase();
    return HIGHLIGHT_KEYWORDS.some(k => lower.includes(k));
  }

  function fmt(n) {
    return Number(n).toLocaleString();
  }

  function renderCategory(cat) {
    const maxVotes = cat.entries[0]?.votes || 1;

    const rows = cat.entries.map((e, i) => {
      const hl = isHighlight(e.title);
      const barWidth = ((e.votes / maxVotes) * 100).toFixed(1);
      return `
        <div class="entry${hl ? ' highlight' : ''}">
          <div class="entry-top">
            <div class="entry-title"><span class="rank">${i + 1}.</span>${e.title}</div>
            <div class="entry-stat">${fmt(e.votes)} (${e.pct}%)</div>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${barWidth}%"></div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="category">
        <div class="category-header">
          <a href="${cat.url}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${cat.name}</a>
          <span class="total-votes">${fmt(cat.total)} votes</span>
        </div>
        <div class="entries">${rows}</div>
      </div>`;
  }

  function renderUpdated(iso) {
    try {
      const d = new Date(iso);
      const now = new Date();
      const diffMin = Math.round((now - d) / 60000);
      const ago = diffMin < 2 ? 'just now'
                : diffMin < 60 ? `${diffMin}m ago`
                : `${Math.round(diffMin / 60)}h ago`;
      return `Updated ${ago}`;
    } catch (_) { return ''; }
  }

  async function load() {
    const status = document.getElementById('status');
    const dashboard = document.getElementById('dashboard');
    try {
      const res = await fetch('data.json?_=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      status.textContent = renderUpdated(data.updated);
      dashboard.innerHTML = `<div class="categories-grid">${data.categories.map(renderCategory).join('')}</div>`;
    } catch (e) {
      status.textContent = 'Could not load data.';
      dashboard.innerHTML = '<p class="error-msg">Vote data hasn\'t been scraped yet. Check back soon.</p>';
    }
  }

  load();
  setInterval(load, 30 * 60 * 1000);
</script>
</body>
</html>
