<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TYSO Webby Watch</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, 'Segoe UI', Arial, sans-serif;
      background: #fff;
      color: #111;
      font-size: 15px;
      line-height: 1.45;
      display: flex;
      flex-direction: column;
      padding: 32px 24px 24px;
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      border-bottom: 2px solid #111;
      padding-bottom: 14px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #status {
      font-size: 0.72rem;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Dashboard shell */
    #dashboard {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      min-height: 0;
      background: #fff;
      max-height: calc(100vh - 150px);
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      width: 100%;
      height: 100%;
    }

    .panel {
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      background: #fff;
    }

    .panel:nth-child(even) {
      border-left: 1.5px solid #ddd;
    }

    .panel:nth-child(-n + 2) {
      border-bottom: 1.5px solid #ddd;
    }

    .panel:nth-child(odd) {
      border-left: none;
    }

    .summary-panel {
      justify-content: flex-start;
    }

    .trend-panel {
      justify-content: space-between;
    }

    .category-header {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #555;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-shrink: 0;
    }

    .panel-kicker {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #b9b9b9;
      margin-bottom: 10px;
    }

    .total-votes {
      font-size: 0.68rem;
      font-weight: 400;
      color: #bbb;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }

    .entries {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .entry {
      padding: 10px 12px;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .entry-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
      gap: 10px;
    }

    .entry-title {
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.25;
    }

    .entry-stat {
      font-size: 0.75rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      color: #888;
      flex-shrink: 0;
    }

    .bar-track {
      height: 4px;
      background: #eee;
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: #111;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .rank {
      font-size: 0.68rem;
      color: #bbb;
      font-variant-numeric: tabular-nums;
      margin-right: 5px;
    }

    /* Highlighted entry */
    .entry.highlight .entry-title {
      color: #111;
    }

    .entry.highlight .bar-fill {
      background: #e9f259;
    }

    .entry.highlight .entry-stat {
      color: #8a9200;
      font-weight: 700;
    }

    /* Trend chart */
    .trend-chart {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .trend-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #bbb;
      margin-bottom: 8px;
    }

    .trend-focus {
      font-size: 0.8rem;
      color: #707070;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .trend-focus strong {
      color: #111;
      font-weight: 600;
    }

    .trend-svg {
      width: 100%;
      height: 100%;
      min-height: 150px;
      display: block;
      overflow: visible;
    }

    .trend-chart-wrap {
      flex: 1;
      min-height: 0;
      border: 1px solid #f3f3f3;
      border-radius: 10px;
      padding: 10px 10px 6px;
      background: linear-gradient(180deg, #fff 0%, #fdfdf7 100%);
    }

    .trend-chart-host {
      height: 100%;
      min-height: 132px;
    }

    @keyframes blink-pulse {
      0%, 100% { opacity: 1; r: 3.5; }
      50% { opacity: 0.25; r: 5; }
    }

    .live-dot {
      animation: blink-pulse 1.4s ease-in-out infinite;
    }

    footer {
      margin-top: 14px;
      font-size: 0.7rem;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    footer a {
      color: #aaa;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }

    .error-msg {
      font-size: 0.85rem;
      color: #888;
      padding: 24px;
    }

    @media (max-width: 600px) {
      html, body {
        height: auto;
      }
      body {
        padding: 20px 16px 16px;
        min-height: 100vh;
      }
      #dashboard {
        max-height: none;
        overflow: visible;
      }
      .dashboard-grid {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(4, auto);
        height: auto;
      }
      .panel {
        border-left: none !important;
        border-bottom: 1.5px solid #ddd;
        overflow: visible;
        height: auto;
      }
      .panel:last-child {
        border-bottom: none;
      }
      .entries {
        overflow: visible;
      }
      .trend-svg {
        min-height: 160px;
      }
      .trend-chart-host {
        min-height: 180px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>TYSO Webby Watch</h1>
  <div id="status">Loading...</div>
</header>

<div id="dashboard"></div>

<footer>
  <span>Updates every 30 min</span>
  <a href="https://vote.webbyawards.com" target="_blank" rel="noopener">Vote on Webby Awards ↗</a>
</footer>

<script type="module">
  import React from 'https://esm.sh/react@19.2.0';
  import { createRoot } from 'https://esm.sh/react-dom@19.2.0/client';
  import { Liveline } from 'https://esm.sh/liveline@0.0.7?deps=react@19.2.0';

  const HIGHLIGHT_KEYWORDS = ['paul rudd', 'tyso', 'take your shoes off'];
  const chartRoots = new Map();

  function isHighlight(title) {
    const lower = title.toLowerCase();
    return HIGHLIGHT_KEYWORDS.some(k => lower.includes(k));
  }

  function fmt(n) {
    return Number(n).toLocaleString();
  }

  // Build per-entry time series from history for a given category name
  function buildSeries(history, categoryName) {
    const series = {}; // title -> [{t, votes}]
    for (const snap of history) {
      const cat = snap.categories.find(c => c.name === categoryName);
      if (!cat) continue;
      for (const entry of cat.entries) {
        if (!series[entry.title]) series[entry.title] = [];
        series[entry.title].push({ t: new Date(snap.t), votes: entry.votes });
      }
    }
    return series;
  }

  function clearChartRoots() {
    for (const root of chartRoots.values()) {
      root.unmount();
    }
    chartRoots.clear();
  }

  function getTrendDirection(points) {
    if (!points || points.length < 2) return 'flat';
    const last = points[points.length - 1].votes;
    const prev = points[points.length - 2].votes;
    if (last > prev) return 'up';
    if (last < prev) return 'down';
    return 'flat';
  }

  function getTrendWindowSecs(points) {
    const times = points.map(point => point.time);
    if (times.length < 2) return 3600;
    const spanSecs = Math.ceil(Math.max(...times) - Math.min(...times));
    return Math.max(spanSecs, 1800);
  }

  function getFeaturedEntry(cat) {
    return cat.entries.find(entry => isHighlight(entry.title)) || cat.entries[0] || null;
  }

  function buildLivelineData(points) {
    return points.map(point => ({
      time: Math.floor(point.t.getTime() / 1000),
      value: point.votes
    }));
  }

  function renderTrendChartHost(catName, focusTitle) {
    return `
      <div class="trend-chart">
        <div class="trend-focus"><strong>${focusTitle}</strong></div>
        <div class="trend-chart-wrap">
          <div class="trend-chart-host" data-chart-for="${catName}"></div>
        </div>
      </div>`;
  }

  function mountTrendCharts(categories, history) {
    clearChartRoots();

    for (const cat of categories) {
      const host = document.querySelector(`[data-chart-for="${CSS.escape(cat.name)}"]`);
      if (!host) continue;

      const seriesMap = history ? buildSeries(history, cat.name) : {};
      const featuredEntry = getFeaturedEntry(cat);
      if (!featuredEntry) continue;

      const featuredPoints = (seriesMap[featuredEntry.title] || [])
        .slice()
        .sort((a, b) => a.t - b.t);
      if (featuredPoints.length === 0) continue;

      const lineData = buildLivelineData(featuredPoints);
      const trendDirection = getTrendDirection(featuredPoints);
      const root = createRoot(host);
      chartRoots.set(cat.name, root);
      root.render(
        React.createElement(Liveline, {
          data: lineData,
          value: featuredPoints[featuredPoints.length - 1]?.votes ?? featuredEntry.votes,
          theme: 'light',
          color: '#b5c400',
          fill: true,
          grid: true,
          badge: true,
          pulse: true,
          scrub: true,
          momentum: trendDirection,
          exaggerate: true,
          lineWidth: 3,
          window: getTrendWindowSecs(lineData),
          windowStyle: 'text',
          formatValue: v => `${Math.round(v).toLocaleString()} votes`,
          padding: { top: 12, right: 90, bottom: 28, left: 12 },
          style: { height: '100%', width: '100%' }
        })
      );
    }
  }

  function renderCategoryPanel(cat) {
    const maxVotes = cat.entries[0]?.votes || 1;

    const rows = cat.entries.map((e, i) => {
      const hl = isHighlight(e.title);
      const barWidth = ((e.votes / maxVotes) * 100).toFixed(1);
      return `
        <div class="entry${hl ? ' highlight' : ''}">
          <div class="entry-top">
            <div class="entry-title"><span class="rank">${i + 1}.</span>${e.title}</div>
            <div class="entry-stat">${fmt(e.votes)} (${e.pct}%)</div>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${barWidth}%"></div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="panel summary-panel">
        <div class="panel-kicker">Standings</div>
        <div class="category-header">
          <a href="${cat.url}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${cat.name}</a>
          <span class="total-votes">${fmt(cat.total)} votes</span>
        </div>
        <div class="entries">${rows}</div>
      </div>`;
  }

  function renderTrendPanel(cat, history) {
    const featuredEntry = getFeaturedEntry(cat);
    return `
      <div class="panel trend-panel">
        <div class="category-header">
          <a href="${cat.url}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${cat.name}</a>
        </div>
        ${history && featuredEntry ? renderTrendChartHost(cat.name, featuredEntry.title) : '<p class="error-msg" style="padding:0;color:#999;">Trend history will appear once more snapshots land.</p>'}
      </div>`;
  }

  function renderUpdated(iso) {
    try {
      const d = new Date(iso);
      const now = new Date();
      const diffMin = Math.round((now - d) / 60000);
      const ago = diffMin < 2 ? 'just now'
                : diffMin < 60 ? `${diffMin}m ago`
                : `${Math.round(diffMin / 60)}h ago`;
      return `Updated ${ago}`;
    } catch (_) { return ''; }
  }

  async function load() {
    const status = document.getElementById('status');
    const dashboard = document.getElementById('dashboard');
    try {
      const [dataRes, histRes] = await Promise.all([
        fetch('data.json?_=' + Date.now()),
        fetch('history.json?_=' + Date.now())
      ]);
      if (!dataRes.ok) throw new Error(`HTTP ${dataRes.status}`);
      const data = await dataRes.json();
      const history = histRes.ok ? await histRes.json() : null;

      status.textContent = renderUpdated(data.updated);
      const summaryPanels = data.categories.map(c => renderCategoryPanel(c)).join('');
      const trendPanels = data.categories.map(c => renderTrendPanel(c, history)).join('');
      dashboard.innerHTML = `<div class="dashboard-grid">${summaryPanels}${trendPanels}</div>`;
      if (history) mountTrendCharts(data.categories, history);
    } catch (e) {
      clearChartRoots();
      status.textContent = 'Could not load data.';
      dashboard.innerHTML = '<p class="error-msg">Vote data hasn\'t been scraped yet. Check back soon.</p>';
    }
  }

  load();
  setInterval(load, 30 * 60 * 1000);
</script>
</body>
</html>
